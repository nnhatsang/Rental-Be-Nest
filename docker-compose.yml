services:
  postgres:
    image: postgres:15
    container_name: postgres
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - ./dev-db/:/var/lib/postgresql/data
    env_file:
      - docker.env

    restart: unless-stopped

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $POSTGRES_USER -d $POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - postgres
    command:
      - 'postgres'
      - '-c'
      - 'track_commit_timestamp=on'
      - '-c'
      - 'log_destination=stderr'

  redis:
    image: redis:7-alpine
    container_name: rental_redis
    restart: always
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes

networks:
  postgres:
    driver: bridge
  redis:
    driver: bridge
